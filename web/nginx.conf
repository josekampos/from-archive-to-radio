server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static site
  location / {
    try_files $uri $uri/ =404;
  }

  # Proxy the MP3 stream through nginx (same origin for browsers)
  location = /live.mp3 {
    proxy_pass http://icecast:8000/live.mp3;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_read_timeout 3600;
  }

  # Proxy Icecast JSON status as /status-json
  location = /status-json {
    proxy_pass http://icecast:8000/status-json.xsl;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_read_timeout 30;
  }

  location = /nowplaying.json {
    alias /usr/share/nginx/html/nowplaying.json;
    add_header Cache-Control "no-store";
  }
}
