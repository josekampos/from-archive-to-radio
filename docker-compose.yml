services:
  icecast:
    image: moul/icecast
    container_name: icecast
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml
      - ./icecast/logs:/var/log/icecast2
    restart: unless-stopped

  liquidsoap:
    image: savonet/liquidsoap:v2.4.0
    container_name: liquidsoap
    depends_on:
      - icecast
    volumes:
      - ./radio:/radio
      - ./cache:/var/radio/cache
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
    command: ["liquidsoap", "/radio/radio.liq"]
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: web
    depends_on:
      - icecast
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  fetcher:
    build: ./fetcher
    container_name: fetcher
    volumes:
      - ./radio:/radio
      - ./cache:/var/radio/cache
    environment:
      - IA_IDENTIFIERS_FILE=/radio/identifiers.txt
      - PLAYLIST_FILE=/radio/playlist.m3u
      - CACHE_DIR=/var/radio/cache
      - TARGET_TRACKS=300
      - MAX_FILE_MB=1000
      - MIN_FREE_MB=1024
      - USER_AGENT=ArchiveRadioFetcher/1.0 (+contact:you@example.com)
    restart: unless-stopped

